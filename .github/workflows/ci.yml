name: Pipeline de Integração Contínua (CI)

#Gatilhos: Quando a esteira vai rodar automaticamente
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  testes:
    runs-on: ubuntu-latest # Máquina virtual Linux 

    # Levanta o banco de dados MySQL temporário na nuvem do GitHub
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root_password_teste
          MYSQL_DATABASE: app_financeiro_teste
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    # Baixa o código do repositório para dentro da máquina virtual
    - name: Copiar código do repositório
      uses: actions/checkout@v4

    # Instala e configura a versão correta do Python
    - name: Configurar o Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13' # Alinhado com a sua versão local

    #Cria cache para as dependências (faz a esteira rodar muito mais rápido)
    - name: Cache de dependências do Python
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    #Instala as bibliotecas do seu requirements.txt
    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Executa a suíte de testes (Unitários e Integração juntos!)
    - name: Executar testes automatizados
      env:
        # Injeta as variáveis de ambiente temporárias para o _ler_configuracao ler da nuvem
        DB_HOST: 127.0.0.1
        DB_USER: root
        DB_PASSWORD: root_password_teste
        DB_NAME: app_financeiro_teste
      run: |
        python -m unittest discover -s tests -p "test_*.py"